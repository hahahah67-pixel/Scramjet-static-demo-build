      html, body {

      .page {

        letter-spacing: 0.04em;

        /* subtle white glow */

      .title span {

      .bar-wrap {

      .bar-wrap input {

      }

      .bar-wrap input::placeholder {

        padding: 0.25rem;
        display: flex;
        align-items: center;
        color: rgba(255,255,255,0.5);
        transition: color 0.2s;

      }

      #status {
        margin-top: 1rem;
        font-size: 0.78rem;

    <!-- Scramjet controller + transport init -->
    <script type="module">

      // ── 2. Service worker ───────────────────────────────────────────────

      await navigator.serviceWorker.ready

      // ── 3. Transport — Epoxy over Mercury Workshop's public Wisp ────────
      const WISP_URL = 'wss://wisp.mercurywork.shop/'

      const conn = new _0zzl94._ak44v7('/h8aze/hhrq5.js')
      await conn.setTransport('/flw9c/3rbpg.mjs', [{ wisp: WISP_URL }])

      document.getElementById('status').textContent = 'Ready'

      // ── 4. Navigation ───────────────────────────────────────────────────
      function navigate(raw) {
        if (!raw.trim()) return
        let url = raw.trim()
        // if no protocol and not a search-looking string, try adding https
        if (!/^https?:\/\//i.test(url)) {
          // looks like a domain if it contains a dot and no spaces
          if (/^[^\s]+\.[^\s]+$/.test(url)) {
            url = 'https://' + url
          } else {
            // treat as search query
            url = 'https://www.google.com/search?q=' + encodeURIComponent(url)
          }
        }
        window.location.href = sj.encodeUrl(url)
      }

      const bar = document.getElementById('searchbar')
      const btn = document.getElementById('go-btn')

      bar.addEventListener('keydown', e => {
        if (e.key === 'Enter') navigate(bar.value)
      })
      btn.addEventListener('click', () => navigate(bar.value))
    </script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scramjet STATIC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <script src="./bare-mux/bare-mux.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Roboto', sans-serif; color: #fff; }
      #home { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 12vh; background: #000; z-index: 10; }
      #home.hidden { opacity: 0; pointer-events: none; }
      .title { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; letter-spacing: 0.04em; white-space: nowrap; margin-bottom: 2.2rem; text-shadow: 0 0 40px rgba(255,255,255,0.18); }
      .title span { font-weight: 500; }
      .bar-wrap { width: min(600px, 88vw); position: relative; }
      .bar-wrap input { width: 100%; padding: 0.85rem 3rem 0.85rem 1.25rem; border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color: #fff; font-family: 'Roboto', sans-serif; font-size: 1rem; font-weight: 300; outline: none; transition: border-color 0.2s, background 0.2s; backdrop-filter: blur(6px); }
      .bar-wrap input::placeholder { color: rgba(255,255,255,0.38); }
      .bar-wrap input:focus { border-color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.1); }
      .bar-wrap button { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0.25rem; display: flex; align-items: center; color: rgba(255,255,255,0.5); transition: color 0.2s; }
      .bar-wrap button:hover { color: #fff; }
      #status { margin-top: 1rem; font-size: 0.78rem; color: rgba(255,255,255,0.3); letter-spacing: 0.03em; min-height: 1.2em; text-align: center; }
      #browser { position: fixed; inset: 0; width: 100%; height: 100%; border: none; background: #000; z-index: 5; display: none; }
      #browser.visible { display: block; }
    </style>
  </head>
  <body>
    <div id="home">
      <h1 class="title">Scramjet <span>STATIC</span></h1>
      <div class="bar-wrap">
        <input id="searchbar" type="text" placeholder="Browse the web" autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="go-btn" aria-label="Go">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
      <p id="status">Initialising…</p>
    </div>

    <iframe
      id="browser"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"
      allow="autoplay; fullscreen"
    ></iframe>

    <script type="module">
      const status = document.getElementById('status')
      const home   = document.getElementById('home')
      const frame  = document.getElementById('browser')
      const bar    = document.getElementById('searchbar')

      let sj = null
      let browsing = false

      // Our OWN in-memory history stack for the iframe — completely
      // independent of the browser's real history. We never read from
      // or rely on browser history state beyond "a back button was pressed".
      let stack = []       // array of encoded URLs
      let stackIndex = -1  // current position in stack

      function showHome() {
        browsing = false
        stack = []
        stackIndex = -1
        home.classList.remove('hidden')
        frame.classList.remove('visible')
        try { frame.contentWindow.location.replace('about:blank') } catch {}
        bar.value = ''
      }

      // Load a URL into the iframe WITHOUT touching our stack
      // (used when we navigate due to back/forward within our own stack)
      function loadIntoFrame(encodedUrl) {
        frame.src = encodedUrl
      }

      // User explicitly navigates to a new URL (typed in bar, or clicked home->site)
      // This TRUNCATES any forward history and pushes a new entry
      function pushUrl(encodedUrl) {
        stack = stack.slice(0, stackIndex + 1)
        stack.push(encodedUrl)
        stackIndex = stack.length - 1
      }

      function showBrowser(encodedUrl) {
        home.classList.add('hidden')
        frame.classList.add('visible')
        browsing = true
        pushUrl(encodedUrl)
        loadIntoFrame(encodedUrl)
        // Single fresh guard — we always keep exactly one entry ahead
        // of wherever the browser's real history currently sits.
        history.pushState({ guard: true, ts: Date.now() }, '')
      }

      // Detect in-iframe link clicks (same-tab navigation within the proxy)
      // by watching load events and comparing the resulting URL against
      // what we expect from our own stack. If the user clicked a link inside
      // the site (not us calling loadIntoFrame for back/forward), the new
      // location differs from stack[stackIndex] — treat it as a new push.
      let expectingFrameLoad = false

      frame.addEventListener('load', () => {
        if (!browsing) return
        if (expectingFrameLoad) {
          // This load was triggered by OUR back/forward — don't push
          expectingFrameLoad = false
          return
        }
        // This load was triggered by the user clicking a link inside the site
        try {
          const currentSrc = frame.contentWindow.location.href
          if (currentSrc && currentSrc !== 'about:blank' && currentSrc !== stack[stackIndex]) {
            pushUrl(currentSrc)
          }
        } catch {
          // Cross-origin — can't read href, but scramjet keeps things same-origin
          // via the prefix so this shouldn't normally happen
        }
      })

      // Every popstate press is trapped here. We NEVER let it fall through.
      window.addEventListener('popstate', (e) => {
        if (!browsing) return

        if (stackIndex > 0) {
          // We have history in OUR stack — go back one step in it
          stackIndex--
          expectingFrameLoad = true
          loadIntoFrame(stack[stackIndex])
        } else {
          // stackIndex is 0 — this is the first page of this session — go home
          showHome()
        }

        // Always re-arm a fresh guard so the NEXT back press is trapped too
        history.pushState({ guard: true, ts: Date.now() }, '')
      })

      function toUrl(raw) {
        const s = raw.trim()
        if (!s) return null
        if (/^https?:\/\//i.test(s)) return s
        if (/^\/\//.test(s)) return 'https:' + s
        if (/^[^\s]+\.[^\s]+$/.test(s)) return 'https://' + s
        return 'https://duckduckgo.com/?q=' + encodeURIComponent(s)
      }

      try {
        const BASE   = new URL('./', document.baseURI).pathname
        const WISP   = 'wss://anura.pro/wisp/'
        const PREFIX = BASE + 'scramjet/'

        const isFirstLoad = !navigator.serviceWorker.controller

        if (isFirstLoad) {
          status.textContent = 'Preparing…'
          const regs = await navigator.serviceWorker.getRegistrations()
          await Promise.all(regs.map(r => r.unregister()))
          await new Promise(r => {
            const req = indexedDB.deleteDatabase('$scramjet')
            req.onsuccess = req.onerror = req.onblocked = r
          })
        }

        status.textContent = 'Loading engine…'
        await import('./scramjet-engine/scramjet.js')

        status.textContent = 'Starting controller…'
        const { ScramjetController } = $scramjetLoadController()
        sj = new ScramjetController({
          prefix: PREFIX,
          files: {
            wasm: BASE + 'scramjet-engine/scramjet.wasm',
            all:  BASE + 'scramjet-engine/scramjet-all.js',
            sync: BASE + 'scramjet-engine/scramjet-sync.js',
          },
        })

        if (isFirstLoad) {
          status.textContent = 'Writing config…'
          await sj.init()
          status.textContent = 'Registering service worker…'
          await navigator.serviceWorker.register(BASE + 'sw.js', { scope: BASE })
          await navigator.serviceWorker.ready
        } else {
          status.textContent = 'Registering service worker…'
          await navigator.serviceWorker.register(BASE + 'sw.js', { scope: BASE })
          await navigator.serviceWorker.ready
          status.textContent = 'Writing config…'
          await sj.init()
        }

        status.textContent = 'Connecting transport…'
        const conn = new _0zzl94._ak44v7(BASE + 'bare-mux/bare-mux-worker.js')
        await conn.setTransport(BASE + 'transport/libcurl.mjs', [{ wisp: WISP }])

        status.textContent = 'Ready'

        function navigate(raw) {
          const url = toUrl(raw)
          if (!url) return
          if (browsing) {
            // Navigating from within a session (typed new URL in bar)
            const encoded = sj.encodeUrl(url)
            pushUrl(encoded)
            expectingFrameLoad = true
            loadIntoFrame(encoded)
            history.pushState({ guard: true, ts: Date.now() }, '')
          } else {
            showBrowser(sj.encodeUrl(url))
          }
        }

        document.getElementById('go-btn').addEventListener('click', () => navigate(bar.value))
        bar.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(bar.value) })

      } catch (err) {
        status.style.color = '#f87171'
        status.textContent = 'Error: ' + err.message
        console.error('[Scramjet STATIC] init error:', err)
      }
    </script>
  </body>
</html>
